name: Weblate Sync

on:
  push:
    branches: [weblate-*]
  pull_request:
    branches: [main]
    paths:
      - "weblate/**"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: contains(github.head_ref, 'weblate') || startsWith(github.ref, 'refs/heads/weblate-')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Import Weblate JSON to markdown
        run: npm run import:weblate

      - name: Check for markdown changes
        id: md-check
        run: |
          if git diff --quiet terms/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated markdown
        if: steps.md-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add terms/
          git commit -m "Sync Weblate translations back to markdown"
          git push

      - name: Verify round-trip
        run: |
          npm run compile
          if ! git diff --quiet weblate/; then
            echo "Round-trip check failed: compile produced a diff after import"
            git diff weblate/
            exit 1
          fi
          echo "Round-trip check passed"
